<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:#020617;
}

nav h2{
  font-size:22px;
}

nav a{
  color:#ccc;
  margin-left:20px;
  text-decoration:none;
}

nav a:hover{
  color:#fff;
}

/* TITLE */
.title{
  text-align:center;
  margin-top:40px;
  font-size:36px;
  background: linear-gradient(90deg,#6366f1,#a855f7);
  -webkit-background-clip:text;
  color:transparent;
}

/* BLOG CONTAINER */
.blog-container{
  max-width:1100px;
  margin:40px auto;
  padding:20px;
}

/* BLOG CARD */
.blog-card{
  display:flex;
  gap:20px;
  background:#0f172a;
  padding:20px;
  border-radius:15px;
  margin-bottom:25px;
  box-shadow:0 0 20px rgba(99,102,241,0.2);
  transition:0.3s;
}

.blog-card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 30px rgba(168,85,247,0.4);
}

.blog-card img{
  width:260px;
  border-radius:10px;
}

/* CONTENT */
.content{
  flex:1;
}

.content h3{
  font-size:20px;
}

.meta{
  margin:8px 0;
  font-size:14px;
  color:#aaa;
}

.meta i{
  margin-right:5px;
}

.content p{
  color:#cbd5f5;
  margin-bottom:10px;
}

/* BUTTON */
.read-btn{
  display:inline-block;
  padding:10px 20px;
  border-radius:20px;
  background:linear-gradient(90deg,#6366f1,#a855f7);
  color:white;
  text-decoration:none;
}

/* RESPONSIVE */
@media(max-width:768px){
  .blog-card{
    flex-direction:column;
  }

  .blog-card img{
    width:100%;
  }
}
</style>
</head>
