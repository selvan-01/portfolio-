<!doctype html>
<html>
<head>
<title>SENTHAMIL SELVAN</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#020617;
  color:white;
  overflow:hidden;
}

/* ===== CANVAS ===== */
#bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* ===== CURSOR ===== */
.cursor{
  position:fixed;
  width:120px;
  height:120px;
  border-radius:50%;
  background:radial-gradient(circle,#22d3ee22,transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:999;
}

.trail{
  position:fixed;
  width:10px;
  height:10px;
  border-radius:50%;
  background:#22d3ee;
  pointer-events:none;
  z-index:998;
}

/* ===== NAV ===== */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  backdrop-filter:blur(10px);
}

nav h2{
  background:linear-gradient(90deg,#8b5cf6,#22d3ee);
  -webkit-background-clip:text;
  color:transparent;
}

nav a{
  color:#94a3b8;
  margin-left:20px;
  text-decoration:none;
}

nav a:hover{
  color:#22d3ee;
}

/* ===== HERO ===== */
.hero{
  text-align:center;
  margin-top:80px;
}

/* PROFILE */
.profile{
  width:150px;
  border-radius:50%;
  border:3px solid #22d3ee;
  box-shadow:0 0 40px rgba(34,211,238,0.6);
}

/* TITLE */
.hero h1{
  margin-top:20px;
  font-size:42px;
}

/* GLOW TEXT */
.name{
  background:linear-gradient(90deg,#8b5cf6,#22d3ee,#8b5cf6);
  background-size:200%;
  -webkit-background-clip:text;
  color:transparent;
  animation:move 4s linear infinite;
  text-shadow:0 0 30px rgba(34,211,238,0.5);
}

@keyframes move{
  0%{background-position:0%;}
  100%{background-position:200%;}
}

/* TYPING */
.typing{
  margin-top:12px;
  font-size:18px;
  color:#94a3b8;
  min-height:28px;
  white-space:nowrap;
  overflow:hidden;
  width:340px;
  margin:auto;
}

.typing::after{
  content:'|';
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* BUTTONS */
.hero-buttons{
  margin-top:30px;
  display:flex;
  justify-content:center;
  gap:20px;
}

.btn{
  padding:12px 30px;
  border-radius:30px;
  border:none;
  cursor:pointer;
  transition:0.3s;
}

.resume{
  border:2px solid #22d3ee;
  background:transparent;
  color:#22d3ee;
}

.projects{
  background:#22d3ee;
  color:#020617;
}

/* MAGNETIC HOVER */
.btn:hover{
  transform:scale(1.1) translateY(-5px);
  box-shadow:0 20px 40px rgba(34,211,238,0.4);
}

/* SOCIAL */
.social{
  margin-top:35px;
}

.social a{
  margin:0 10px;
  color:#94a3b8;
  font-size:20px;
}

.social a:hover{
  color:#22d3ee;
  transform:scale(1.3);
}

</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>

<nav>
<h2>SENTHAMIL SELVAN</h2>

<div>

</div>
</nav>

<section class="hero">

<img src="assets/profile.jpeg" class="profile">

<h1>Hi, I'm <span class="name">SENTHAMIL SELVAN</span></h1>

<div class="typing" id="typing"></div>

<div class="hero-buttons">
<a href="assets/resume.pdf" target="_blank">
<button class="btn resume">Resume</button>
</a>

<a href="projects.html">
<button class="btn projects">Projects</button>
</a>
</div>

<div class="social">
<a href="#"><i class="fab fa-facebook"></i></a>
<a href="#"><i class="fa-brands fa-x-twitter"></i></a>
<a href="#"><i class="fab fa-linkedin"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
</div>

</section>

<script>
// TYPING
const roles=["Machine Learning Engineer","Data Scientist","AI Developer"];
let i=0,j=0,del=false;

function type(){
let text=roles[i];
document.getElementById("typing").innerHTML=text.substring(0,j);

if(!del) j++; else j--;

if(j===text.length){del=true;setTimeout(type,1500);return;}
if(j===0){del=false;i=(i+1)%roles.length;}

setTimeout(type,del?60:120);
}
type();

// CURSOR
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

// PARTICLES (INTERACTIVE)
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.5,
vy:(Math.random()-0.5)*0.5
});
}

let mouse={x:0,y:0};
window.addEventListener("mousemove",e=>{
mouse.x=e.x;
mouse.y=e.y;
});

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;

let dx=p.x-mouse.x;
let dy=p.y-mouse.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<120){
p.x+=dx/20;
p.y+=dy/20;
}

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="#22d3ee";
ctx.fill();
});

requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
