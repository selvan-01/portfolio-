<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
  e.preventDefault(); // STOP default form

  var name = document.getElementById("name").value;
  var email = document.getElementById("email").value;
  var message = document.getElementById("message").value;

  // 📧 SEND EMAIL (FormSubmit via fetch)
  fetch("https://formsubmit.co/ajax/senthamils445@gmail.com", {
    method: "POST",
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      name: name,
      email: email,
      message: message
    })
  })
  .then(response => response.json())
  .then(data => {
    console.log("Email sent:", data);

    // ✅ SHOW POPUP
    document.getElementById("successPopup").style.display = "block";

    // 📱 OPEN WHATSAPP
    var phoneNumber = "919344523505";
    var text = `New Contact%0AName: ${name}%0AEmail: ${email}%0AMessage: ${message}`;
    window.open("https://wa.me/" + phoneNumber + "?text=" + text, "_blank");

    // 🔄 RESET FORM
    document.getElementById("contactForm").reset();
  })
  .catch(error => {
    alert("Error sending message ❌");
    console.error(error);
  });

});

function closePopup(){
  document.getElementById("successPopup").style.display = "none";
}
</script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
}

nav a{
  color:#94a3b8;
  margin-left:20px;
  text-decoration:none;
}

nav a:hover{
  color:#38bdf8;
}

/* CONTAINER */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:85vh;
}

/* CARD */
.card{
  width:400px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  box-shadow:0 0 40px rgba(56,189,248,0.4);
  animation:fadeIn 1s ease;
}

/* TITLE */
.title{
  text-align:center;
  font-size:26px;
  margin-bottom:10px;
}

.title span{
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  -webkit-background-clip:text;
  color:transparent;
}

/* SUBTEXT */
.sub{
  text-align:center;
  font-size:13px;
  color:#94a3b8;
  margin-bottom:20px;
}

/* INPUT BOX */
.input-box{
  position:relative;
  margin-bottom:15px;
}

.input-box input,
.input-box textarea{
  width:100%;
  padding:12px 40px;
  border:none;
  outline:none;
  border-radius:10px;
  background:#020617;
  color:white;
  font-size:14px;
}

.input-box textarea{
  height:100px;
  resize:none;
}

/* ICON */
.input-box i{
  position:absolute;
  top:12px;
  left:12px;
  color:#38bdf8;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* MOBILE */
@media(max-width:768px){
  .card{width:90%;}
}
</style>
</head>

<body>

<nav>
<h2>SENTHAMIL SELVAN</h2>
<div>
<a href="index.html">Home</a>
<a href="tools.html">Tools</a>
<a href="blog.html">Blog</a>
<a href="projects.html">Projects</a>
<a href="about.html">About</a>
</div>
</nav>

<div class="container">

<div class="card">

<h1 class="title">Contact <span>Me</span></h1>
<p class="sub">I'd love to hear from you! Fill the form below.</p>

<form id="contactForm">

<div class="input-box">
<i class="fas fa-user"></i>
<input type="text" id="name" placeholder="Your Name" required>
</div>

<div class="input-box">
<i class="fas fa-envelope"></i>
<input type="email" id="email" placeholder="Your Email" required>
</div>

<div class="input-box">
<i class="fas fa-message"></i>
<textarea id="message" placeholder="Your Message" required></textarea>
</div>

<button type="submit">
<i class="fas fa-paper-plane"></i> Send Message
</button>

</form>

<div id="successPopup" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0f172a;
padding:30px;
border-radius:15px;
box-shadow:0 0 30px #38bdf8;
text-align:center;
z-index:999;
">
<h2 style="color:#38bdf8;">✅ Message Sent!</h2>
<p style="color:#94a3b8;">Thanks for contacting me.</p>
<button onclick="closePopup()" style="
margin-top:15px;
padding:8px 15px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
cursor:pointer;">
OK
</button>
</div>
</div>

</div>

</body>
</html>
