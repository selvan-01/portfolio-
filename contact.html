<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

html{scroll-behavior:smooth;}

body{
  background:#020617;
  color:white;
  overflow-x:hidden;
  overflow-y:auto;
}

/* BACKGROUND */
#bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* CURSOR */
.cursor{
  position:fixed;
  width:120px;
  height:120px;
  border-radius:50%;
  background:radial-gradient(circle,#22d3ee22,transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:999;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  backdrop-filter:blur(10px);
}

nav h2{
  background:linear-gradient(90deg,#8b5cf6,#22d3ee);
  -webkit-background-clip:text;
  color:transparent;
}

nav a{
  color:#94a3b8;
  margin-left:20px;
  text-decoration:none;
}

nav a:hover{
  color:#22d3ee;
}

/* CONTAINER */
.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:60px 20px;
}

/* CARD */
.card{
  width:420px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(34,211,238,0.3);
  animation:fadeUp 1s ease;
}

/* TITLE */
.title{
  text-align:center;
  font-size:26px;
  margin-bottom:10px;
}

.title span{
  background:linear-gradient(90deg,#8b5cf6,#22d3ee,#8b5cf6);
  background-size:200%;
  -webkit-background-clip:text;
  color:transparent;
  animation:move 4s linear infinite;
}

/* SUBTEXT */
.sub{
  text-align:center;
  font-size:13px;
  color:#94a3b8;
  margin-bottom:25px;
}

/* SOCIAL GRID */
.social-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

/* SOCIAL BOX */
.social-grid a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.05);
  transition:0.3s;
}

/* ICON COLORS */
.social-grid a i{
  color:#22d3ee;
}

/* HOVER EFFECT */
.social-grid a:hover{
  background:#22d3ee;
  color:#020617;
  transform:translateY(-5px) scale(1.05);
  box-shadow:0 10px 25px rgba(34,211,238,0.5);
}

.social-grid a:hover i{
  color:#020617;
}

/* ANIMATION */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes move{
  0%{background-position:0%;}
  100%{background-position:200%;}
}

/* MOBILE */
@media(max-width:768px){
  .card{width:90%;}
}

<script>
// CURSOR
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

// PARTICLES
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let p=[];
for(let i=0;i<60;i++){
p.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.4,
vy:(Math.random()-0.5)*0.4
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

p.forEach(a=>{
a.x+=a.vx;
a.y+=a.vy;

if(a.x<0||a.x>canvas.width)a.vx*=-1;
if(a.y<0||a.y>canvas.height)a.vy*=-1;

ctx.beginPath();
ctx.arc(a.x,a.y,2,0,Math.PI*2);
ctx.fillStyle="#22d3ee";
ctx.fill();
});

requestAnimationFrame(animate);
}
animate();
</script>
